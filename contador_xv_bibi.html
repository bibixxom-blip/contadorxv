<!DOCTYPE html><html><head><meta charset='UTF-8'><link href='https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&display=swap' rel='stylesheet'><style>*{margin:0}body{display:flex;justify-content:center;align-items:center;height:100vh}.contador{display:flex;gap:35px;text-align:center}.numero{font-family:"Great Vibes";font-size:58px;color:#d83ec4}.texto{font-family:Cinzel;color:#9329aa}</style></head><body><div class='contador'><div><div id='days' class='numero'></div><div class='texto'>Días</div></div><div><div id='hours' class='numero'></div><div class='texto'>Horas</div></div><div><div id='minutes' class='numero'></div><div class='texto'>Minutos</div></div><div><div id='seconds' class='numero'></div><div class='texto'>Segundos</div></div></div><script>const t=new Date(2026,6,11,22,0,0);function u(){let d=t-new Date();if(d<0)d=0;days.textContent=Math.floor(d/86400000);hours.textContent=String(Math.floor(d%86400000/3600000)).padStart(2,'0');minutes.textContent=String(Math.floor(d%3600000/60000)).padStart(2,'0');seconds.textContent=String(Math.floor(d%60000/1000)).padStart(2,'0')}u();setInterval(u,1000);</script></body></html>
